<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Vulcan Mobile</title>
    <style>
        body {
            background-color: #020502;
            color: #22c55e;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .app-card {
            background: #0a0a0a;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #22c55e;
            text-align: center;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        button {
            background: #22c55e;
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>VULCAN MOBILE</h1>
        <p>System Status: <span style="color: white;">ONLINE</span></p>
        <button onclick="alert('System Synced!')">LAUNCH PROTOCOL</button>
    </div>

</body>
</html>
